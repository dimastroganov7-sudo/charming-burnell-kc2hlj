<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GELTEK трансфер</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>GELTEK трансфер</h1>
    </header>

    <!-- Вкладки -->
    <div class="tabs">
      <button class="tab active" data-tab="schedule">Расписание</button>
      <button class="tab" data-tab="admin">Настройка администратора</button>
    </div>

    <!-- Контент вкладок -->
    <div class="content">
      <!-- Вкладка "Расписание" -->
      <div id="scheduleTab" class="tab-content active">
        <div class="filter-panel">
          <div class="calendar-block">
            <label>Дата:</label>
            <input type="date" id="datePicker" class="date-input" />
          </div>

          <div class="direction-block">
            <span class="filter-label">Направление:</span>
            <label class="radio-label">
              <input type="radio" name="direction" value="metro" checked /> От метро
            </label>
            <label class="radio-label">
              <input type="radio" name="direction" value="gate" /> От проходной
            </label>
          </div>

          <div class="locations-block">
            <span class="filter-label">Пункт назначения:</span>
            <label class="checkbox-label">
              <input type="checkbox" id="chkOffice" checked /> Офис
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="chkProduction" /> Производство
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="chkWarehouse" /> Склад
            </label>
          </div>

          <button id="showScheduleBtn" class="show-button">Показать расписание</button>
        </div>

        <div id="scheduleResult" class="schedule-result">
          <h3 id="scheduleDateTitle">Расписание на </h3>
          <table id="scheduleTable" class="schedule-table">
            <thead>
              <tr><th>Время</th><th>Откуда</th><th>Куда</th></tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
          </table>
          <p id="noDataMessage" class="no-data" style="display: none;">Нет рейсов по заданным фильтрам.</p>
        </div>
      </div>

      <!-- Вкладка "Настройка администратора" -->
      <div id="adminTab" class="tab-content">
        <!-- Экран входа -->
        <div id="loginPanel" class="admin-login">
          <h2>Доступ администратора</h2>
          <form id="loginForm">
            <input type="password" id="passwordInput" class="password-input" placeholder="Введите пароль" />
            <p id="loginError" class="error-message" style="display: none;">Неверный пароль</p>
            <button type="submit" class="login-button">Войти</button>
          </form>
        </div>

        <!-- Панель управления рейсами -->
        <div id="editorPanel" class="admin-panel" style="display: none;">
          <div class="admin-header">
            <h2>Управление рейсами</h2>
            <button id="addNewRouteBtn" class="add-button">+ Добавить рейс</button>
          </div>

          <!-- Фильтр для списка рейсов -->
          <div class="admin-filter">
            <div class="form-group">
              <label>Дата (для просмотра):</label>
              <input type="date" id="adminFilterDate" class="date-input" />
            </div>
            <div class="form-group">
              <label>Направление:</label>
              <select id="adminFilterDirection" class="select-input">
                <option value="all">Все</option>
                <option value="metro">От метро</option>
                <option value="gate">От проходной</option>
              </select>
            </div>
            <button id="applyAdminFilterBtn" class="secondary-button">Применить</button>
            <button id="resetAdminFilterBtn" class="secondary-button outline">Сбросить</button>
          </div>

          <!-- Список существующих рейсов -->
          <div id="routesList" class="routes-list"></div>

          <!-- Форма добавления/редактирования (изначально скрыта) -->
          <div id="routeFormPanel" class="route-form-panel" style="display: none;">
            <h3 id="formTitle">Новый рейс</h3>
            <form id="routeForm">
              <input type="hidden" id="routeId" />

              <div class="form-row">
                <label>Тип рейса:</label>
                <select id="routeType" class="select-input">
                  <option value="once">Однократный (конкретная дата)</option>
                  <option value="repeat">Повторяющийся по дням недели</option>
                </select>
              </div>

              <div id="onceDateBlock" class="form-row">
                <label>Дата:</label>
                <input type="date" id="routeDate" class="date-input" />
              </div>

              <div id="repeatDaysBlock" class="form-row" style="display: none;">
                <label>Дни недели:</label>
                <div class="weekdays">
                  <label><input type="checkbox" value="1" class="weekday-chk" /> Пн</label>
                  <label><input type="checkbox" value="2" class="weekday-chk" /> Вт</label>
                  <label><input type="checkbox" value="3" class="weekday-chk" /> Ср</label>
                  <label><input type="checkbox" value="4" class="weekday-chk" /> Чт</label>
                  <label><input type="checkbox" value="5" class="weekday-chk" /> Пт</label>
                  <label><input type="checkbox" value="6" class="weekday-chk" /> Сб</label>
                  <label><input type="checkbox" value="0" class="weekday-chk" /> Вс</label>
                </div>
              </div>

              <div class="form-row">
                <label>Направление:</label>
                <select id="routeDirection" class="select-input">
                  <option value="metro">От метро</option>
                  <option value="gate">От проходной</option>
                </select>
              </div>

              <div class="form-row">
                <label>Пункт назначения:</label>
                <select id="routeLocation" class="select-input">
                  <option value="office">Офис</option>
                  <option value="production">Производство</option>
                  <option value="warehouse">Склад</option>
                </select>
              </div>

              <div class="form-row">
                <label>Время отправления:</label>
                <input type="time" id="routeTime" required />
              </div>

              <div class="form-actions">
                <button type="submit" class="save-button">Сохранить</button>
                <button type="button" id="cancelFormBtn" class="secondary-button outline">Отмена</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // ---------- Константы ----------
      const STORAGE_KEY = 'geltek_transfer_routes';
      const CORRECT_PASSWORD = 'GELTEK+12345+';

      // Маппинг дней недели: JS getDay() (0 = воскресенье, 1-6)
      const WEEKDAYS = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];

      // ---------- DOM элементы ----------
      // Вкладки
      const tabs = document.querySelectorAll('.tab');
      const scheduleTab = document.getElementById('scheduleTab');
      const adminTab = document.getElementById('adminTab');

      // Расписание
      const datePicker = document.getElementById('datePicker');
      const directionRadios = document.querySelectorAll('input[name="direction"]');
      const chkOffice = document.getElementById('chkOffice');
      const chkProduction = document.getElementById('chkProduction');
      const chkWarehouse = document.getElementById('chkWarehouse');
      const showBtn = document.getElementById('showScheduleBtn');
      const scheduleBody = document.getElementById('scheduleBody');
      const scheduleDateTitle = document.getElementById('scheduleDateTitle');
      const noDataMessage = document.getElementById('noDataMessage');
      const scheduleTable = document.getElementById('scheduleTable');

      // Админка
      const loginPanel = document.getElementById('loginPanel');
      const editorPanel = document.getElementById('editorPanel');
      const loginForm = document.getElementById('loginForm');
      const passwordInput = document.getElementById('passwordInput');
      const loginError = document.getElementById('loginError');

      // Фильтры админки
      const adminFilterDate = document.getElementById('adminFilterDate');
      const adminFilterDirection = document.getElementById('adminFilterDirection');
      const applyAdminFilterBtn = document.getElementById('applyAdminFilterBtn');
      const resetAdminFilterBtn = document.getElementById('resetAdminFilterBtn');

      // Список рейсов
      const routesList = document.getElementById('routesList');
      const addNewRouteBtn = document.getElementById('addNewRouteBtn');

      // Форма рейса
      const routeFormPanel = document.getElementById('routeFormPanel');
      const formTitle = document.getElementById('formTitle');
      const routeForm = document.getElementById('routeForm');
      const routeId = document.getElementById('routeId');
      const routeType = document.getElementById('routeType');
      const onceDateBlock = document.getElementById('onceDateBlock');
      const repeatDaysBlock = document.getElementById('repeatDaysBlock');
      const routeDate = document.getElementById('routeDate');
      const routeDirection = document.getElementById('routeDirection');
      const routeLocation = document.getElementById('routeLocation');
      const routeTime = document.getElementById('routeTime');
      const cancelFormBtn = document.getElementById('cancelFormBtn');
      const weekdayChks = document.querySelectorAll('.weekday-chk');

      // ---------- Состояние ----------
      let routes = [];                // массив объектов рейсов
      let isAdmin = false;
      let editingRouteId = null;      // id редактируемого рейса или null

      // ---------- Загрузка / сохранение данных ----------
      function loadRoutes() {
        const saved = localStorage.getItem(STORAGE_KEY);
        routes = saved ? JSON.parse(saved) : [];
      }
      function saveRoutes() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(routes));
        window.dispatchEvent(new Event('storage'));
      }

      loadRoutes();

      // Установить сегодняшние даты по умолчанию
      const today = new Date().toISOString().split('T')[0];
      datePicker.value = today;
      adminFilterDate.value = today;
      if (routeDate) routeDate.value = today;

      // ---------- Вспомогательные функции ----------
      function getDayOfWeekFromDate(dateStr) {
        const d = new Date(dateStr);
        return d.getDay(); // 0 = вс, 1-6
      }

      // Проверяет, подходит ли рейс для заданной даты
      function isRouteValidForDate(route, dateStr) {
        if (route.type === 'once') {
          return route.date === dateStr;
        } else { // repeat
          const dayOfWeek = getDayOfWeekFromDate(dateStr);
          return route.repeatDays && route.repeatDays.includes(dayOfWeek);
        }
      }

      // Форматирование информации о повторении для отображения
      function formatRepeatDays(daysArray) {
        if (!daysArray || daysArray.length === 0) return '—';
        return daysArray.map(d => WEEKDAYS[d]).join(', ');
      }

      // ---------- Отображение расписания (вкладка "Расписание") ----------
      function renderSchedule() {
        const selectedDate = datePicker.value;
        const direction = getSelectedDirection();
        const locations = [];
        if (chkOffice.checked) locations.push({ key: 'office', name: 'Офис' });
        if (chkProduction.checked) locations.push({ key: 'production', name: 'Производство' });
        if (chkWarehouse.checked) locations.push({ key: 'warehouse', name: 'Склад' });

        const fromName = direction === 'metro' ? 'метро' : 'проходная';

        // Фильтруем рейсы
        const filtered = routes.filter(route => {
          if (route.direction !== direction) return false;
          if (!locations.some(loc => loc.key === route.location)) return false;
          return isRouteValidForDate(route, selectedDate);
        });

        // Сортируем по времени
        filtered.sort((a, b) => a.time.localeCompare(b.time));

        const formattedDate = selectedDate.split('-').reverse().join('.');
        scheduleDateTitle.textContent = `Расписание на ${formattedDate}`;

        scheduleBody.innerHTML = '';
        if (filtered.length === 0) {
          scheduleTable.style.display = 'none';
          noDataMessage.style.display = 'block';
        } else {
          scheduleTable.style.display = 'table';
          noDataMessage.style.display = 'none';
          filtered.forEach(route => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${route.time}</td><td>${fromName}</td><td>${getLocationName(route.location)}</td>`;
            scheduleBody.appendChild(tr);
          });
        }
      }

      function getSelectedDirection() {
        for (let radio of directionRadios) if (radio.checked) return radio.value;
        return 'metro';
      }

      function getLocationName(key) {
        const map = { office: 'Офис', production: 'Производство', warehouse: 'Склад' };
        return map[key] || key;
      }

      // ---------- Переключение вкладок ----------
      function switchTab(tabId) {
        tabs.forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

        if (tabId === 'schedule') {
          tabs[0].classList.add('active');
          scheduleTab.classList.add('active');
          renderSchedule();
        } else {
          tabs[1].classList.add('active');
          adminTab.classList.add('active');
          if (isAdmin) {
            renderAdminRoutesList();
          }
        }
      }

      tabs[0].addEventListener('click', () => switchTab('schedule'));
      tabs[1].addEventListener('click', () => switchTab('admin'));

      // ---------- Админка: рендер списка рейсов ----------
      function getFilteredAdminRoutes() {
        const filterDate = adminFilterDate.value;
        const filterDir = adminFilterDirection.value;

        return routes.filter(route => {
          if (filterDir !== 'all' && route.direction !== filterDir) return false;
          // Для повторяющихся показываем всегда? Или только если активны в выбранную дату?
          // Показываем все, чтобы можно было управлять.
          return true;
        });
      }

      function renderAdminRoutesList() {
        const filtered = getFilteredAdminRoutes();
        if (filtered.length === 0) {
          routesList.innerHTML = '<p class="no-data">Нет рейсов. Нажмите «Добавить рейс».</p>';
          return;
        }

        const filterDate = adminFilterDate.value;
        let html = '<div class="routes-table-container"><table class="routes-table"><thead><tr><th>Тип</th><th>Дата / Дни</th><th>Напр.</th><th>Куда</th><th>Время</th><th>Действия</th></tr></thead><tbody>';

        filtered.forEach(route => {
          const typeText = route.type === 'once' ? 'Разовый' : 'Повтор';
          let dateOrDays = '';
          if (route.type === 'once') {
            dateOrDays = route.date.split('-').reverse().join('.');
          } else {
            dateOrDays = formatRepeatDays(route.repeatDays);
          }
          const directionText = route.direction === 'metro' ? 'От метро' : 'От проходной';
          const locationText = getLocationName(route.location);

          // Подсветка активен ли рейс в выбранную дату фильтра
          const isActive = isRouteValidForDate(route, filterDate);
          const rowClass = isActive ? '' : 'inactive-route';

          html += `<tr class="${rowClass}">
            <td>${typeText}</td>
            <td>${dateOrDays}</td>
            <td>${directionText}</td>
            <td>${locationText}</td>
            <td>${route.time}</td>
            <td>
              <button class="icon-btn edit-btn" data-id="${route.id}">✎</button>
              <button class="icon-btn delete-btn" data-id="${route.id}">🗑</button>
            </td>
          </tr>`;
        });

        html += '</tbody></table></div>';
        routesList.innerHTML = html;

        // Навешиваем обработчики на кнопки
        document.querySelectorAll('.edit-btn').forEach(btn => {
          btn.addEventListener('click', () => startEditRoute(btn.dataset.id));
        });
        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', () => deleteRoute(btn.dataset.id));
        });
      }

      function startEditRoute(id) {
        const route = routes.find(r => r.id === id);
        if (!route) return;
        editingRouteId = id;
        formTitle.textContent = 'Редактирование рейса';
        routeId.value = id;
        routeType.value = route.type;
        routeDirection.value = route.direction;
        routeLocation.value = route.location;
        routeTime.value = route.time;

        if (route.type === 'once') {
          routeDate.value = route.date || today;
          onceDateBlock.style.display = 'block';
          repeatDaysBlock.style.display = 'none';
        } else {
          onceDateBlock.style.display = 'none';
          repeatDaysBlock.style.display = 'block';
          // Отмечаем чекбоксы дней
          weekdayChks.forEach(chk => {
            chk.checked = route.repeatDays && route.repeatDays.includes(parseInt(chk.value));
          });
        }

        routeFormPanel.style.display = 'block';
      }

      function deleteRoute(id) {
        if (!confirm('Удалить этот рейс?')) return;
        routes = routes.filter(r => r.id !== id);
        saveRoutes();
        renderAdminRoutesList();
        if (scheduleTab.classList.contains('active')) renderSchedule();
      }

      // ---------- Форма добавления / редактирования ----------
      function resetForm() {
        routeForm.reset();
        routeId.value = '';
        editingRouteId = null;
        formTitle.textContent = 'Новый рейс';
        routeType.value = 'once';
        onceDateBlock.style.display = 'block';
        repeatDaysBlock.style.display = 'none';
        if (routeDate) routeDate.value = today;
        routeFormPanel.style.display = 'none';
      }

      routeType.addEventListener('change', () => {
        if (routeType.value === 'once') {
          onceDateBlock.style.display = 'block';
          repeatDaysBlock.style.display = 'none';
        } else {
          onceDateBlock.style.display = 'none';
          repeatDaysBlock.style.display = 'block';
        }
      });

      routeForm.addEventListener('submit', (e) => {
        e.preventDefault();

        const type = routeType.value;
        const direction = routeDirection.value;
        const location = routeLocation.value;
        const time = routeTime.value;

        if (!time) {
          alert('Укажите время');
          return;
        }

        let routeData = {
          id: editingRouteId || Date.now().toString() + Math.random().toString(36),
          type,
          direction,
          location,
          time,
        };

        if (type === 'once') {
          if (!routeDate.value) {
            alert('Выберите дату');
            return;
          }
          routeData.date = routeDate.value;
        } else {
          const selectedDays = [];
          weekdayChks.forEach(chk => {
            if (chk.checked) selectedDays.push(parseInt(chk.value));
          });
          if (selectedDays.length === 0) {
            alert('Выберите хотя бы один день недели');
            return;
          }
          routeData.repeatDays = selectedDays;
        }

        if (editingRouteId) {
          const index = routes.findIndex(r => r.id === editingRouteId);
          if (index !== -1) routes[index] = routeData;
        } else {
          routes.push(routeData);
        }

        saveRoutes();
        resetForm();
        renderAdminRoutesList();
        if (scheduleTab.classList.contains('active')) renderSchedule();
      });

      cancelFormBtn.addEventListener('click', resetForm);

      addNewRouteBtn.addEventListener('click', () => {
        resetForm();
        routeFormPanel.style.display = 'block';
      });

      // Фильтры в админке
      applyAdminFilterBtn.addEventListener('click', renderAdminRoutesList);
      resetAdminFilterBtn.addEventListener('click', () => {
        adminFilterDirection.value = 'all';
        adminFilterDate.value = today;
        renderAdminRoutesList();
      });

      // ---------- Вход админа ----------
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        if (passwordInput.value === CORRECT_PASSWORD) {
          isAdmin = true;
          loginPanel.style.display = 'none';
          editorPanel.style.display = 'block';
          loginError.style.display = 'none';
          passwordInput.value = '';
          renderAdminRoutesList();
        } else {
          loginError.style.display = 'block';
        }
      });

      // ---------- События ----------
      showBtn.addEventListener('click', renderSchedule);

      window.addEventListener('storage', () => {
        loadRoutes();
        if (scheduleTab.classList.contains('active')) renderSchedule();
        if (isAdmin && editorPanel.style.display === 'block') renderAdminRoutesList();
      });

      // Первоначальный рендер
      renderSchedule();
    })();
  </script>
</body>
</html>
